<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#0d1f35" />
      <stop offset="100%" stop-color="#060a10" />
    </radialGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
    <filter id="strongGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
    <clipPath id="leftEyeClip"><rect x="58" y="74" width="32" height="22" rx="5" /></clipPath>
    <clipPath id="rightEyeClip"><rect x="110" y="74" width="32" height="22" rx="5" /></clipPath>
  </defs>

  <rect width="200" height="200" fill="transparent" rx="18" />

  <g stroke="#00ff9d" stroke-width="0.6" opacity="0.25" fill="none">
    <polyline points="15,45 40,45 40,62"/>
    <circle cx="40" cy="45" r="2.5" fill="#00ff9d"/>
    <polyline points="185,45 160,45 160,62"/>
    <circle cx="160" cy="45" r="2.5" fill="#00ff9d"/>
    <polyline points="15,158 40,158 40,142"/>
    <circle cx="40" cy="158" r="2.5" fill="#00ff9d"/>
    <polyline points="185,158 160,158 160,142"/>
    <circle cx="160" cy="158" r="2.5" fill="#00ff9d"/>
  </g>

  <rect x="45" y="58" width="110" height="90" rx="12" fill="#081824" stroke="#00c8ff" stroke-width="1.5" filter="url(#glow)" />

  <line x1="100" y1="58" x2="100" y2="40" stroke="#00c8ff" stroke-width="2" filter="url(#glow)" />
  <circle class="antenna-dot" cx="100" cy="36" r="5" fill="#00ff9d" filter="url(#strongGlow)" />
  <circle cx="100" cy="36" r="2.5" fill="#e0fff5" />

  <rect x="33" y="76" width="12" height="24" rx="3" fill="#0a1a28" stroke="#00c8ff" stroke-width="1" />
  <rect x="155" y="76" width="12" height="24" rx="3" fill="#0a1a28" stroke="#00c8ff" stroke-width="1" />
  <circle cx="39" cy="83" r="2" fill="#00ff9d" opacity="0.9" />
  <circle cx="39" cy="91" r="2" fill="#00c8ff" opacity="0.7" />
  <circle cx="161" cy="83" r="2" fill="#00ff9d" opacity="0.9" />
  <circle cx="161" cy="91" r="2" fill="#00c8ff" opacity="0.7" />

  <g class="eye-left">
    <rect x="58" y="74" width="32" height="22" rx="5" fill="#030f1a" stroke="#00c8ff" stroke-width="1.5" filter="url(#glow)" />
    <rect x="62" y="78" width="24" height="14" rx="3" fill="#001025" />
    <rect x="64" y="80" width="20" height="10" rx="2" fill="#00aaff" opacity="0.85" filter="url(#strongGlow)" />
    <g clip-path="url(#leftEyeClip)">
      <rect x="58" y="84" width="32" height="1" fill="#00ffff" opacity="0.4" />
    </g>
  </g>

  <g class="eye-right">
    <rect x="110" y="74" width="32" height="22" rx="5" fill="#030f1a" stroke="#00c8ff" stroke-width="1.5" filter="url(#glow)" />
    <rect x="114" y="78" width="24" height="14" rx="3" fill="#001025" />
    <rect x="116" y="80" width="20" height="10" rx="2" fill="#00aaff" opacity="0.85" filter="url(#strongGlow)" />
    <g clip-path="url(#rightEyeClip)">
      <rect x="110" y="84" width="32" height="1" fill="#00ffff" opacity="0.4" />
    </g>
  </g>

  <polygon points="100,101 96,109 104,109" fill="#00c8ff" opacity="0.55" filter="url(#glow)" />

  <rect x="58" y="116" width="84" height="22" rx="4" fill="#010c16" stroke="#00c8ff" stroke-width="1" />
  <text x="66" y="131" font-family="monospace" font-size="11" fill="#00ff9d" filter="url(#glow)">&lt;/&gt;</text>
  <text x="91" y="131" font-family="monospace" font-size="11" fill="#00c8ff">&#123; &#125;</text>
  <text x="118" y="131" font-family="monospace" font-size="11" fill="#00ff9d">_</text>
  <text class="cursor" x="126" y="131" font-family="monospace" font-size="11" fill="#00ff9d">|</text>

  <circle cx="80" cy="143" r="1.8" fill="#00c8ff" opacity="0.45" />
  <circle cx="100" cy="143" r="1.8" fill="#00c8ff" opacity="0.45" />
  <circle cx="120" cy="143" r="1.8" fill="#00c8ff" opacity="0.45" />
  <line x1="80" y1="143" x2="120" y2="143" stroke="#00c8ff" stroke-width="0.5" opacity="0.25" />

  <style>
    @keyframes blink {
      0%, 90%, 100% { opacity: 1; }
      95% { opacity: 0; }
    }
    @keyframes antennaPulse {
      0%, 100% { r: 5; opacity: 1; }
      50% { r: 7; opacity: 0.6; }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-6px); }
    }
    @keyframes cursorBlink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
    .robot-wrap { animation: float 3s ease-in-out infinite; }
    .eye-left { animation: blink 4s ease-in-out infinite; }
    .eye-right { animation: blink 4s ease-in-out infinite 0.1s; }
    .antenna-dot { animation: antennaPulse 1.5s ease-in-out infinite; }
    .cursor { animation: cursorBlink 1s step-end infinite; }
  </style>
</svg>
